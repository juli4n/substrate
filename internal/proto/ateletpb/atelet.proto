syntax = "proto3";

package atelet;

option go_package = "github.com/agent-substrate/substrate/internal/proto/ateletpb";

service AteomHerder {
  // Run tells atelet to create a new containerized workload from scratch on a
  // free ateom. Atelet picks the ateom from its local pool. Idempotent: if the
  // actor is already running on this node, returns OK with the existing pod.
  // Returns RESOURCE_EXHAUSTED if no free ateoms are available.
  rpc Run(RunRequest) returns (RunResponse) {}

  // Checkpoint tells atelet to save the current state of the workload on an
  // ateom to object storage, and then reset the ateom to a blank state
  // (back to "available" state.)
  rpc Checkpoint(CheckpointRequest) returns (CheckpointResponse) {}

  // Restore restores a workload from checkpoint onto a free ateom. Atelet
  // picks the ateom from its local pool. Idempotent: if the actor is already
  // running on this node, returns OK with the existing pod.
  // Returns RESOURCE_EXHAUSTED if no free ateoms are available.
  rpc Restore(RestoreRequest) returns (RestoreResponse) {}

  // WatchCapacity streams capacity snapshots for all worker pools managed by
  // this atelet. On connect and after every capacity change, atelet sends a
  // complete CapacitySnapshot covering all pools on this node.
  rpc WatchCapacity(WatchCapacityRequest) returns (stream CapacitySnapshot) {}
}

message RunRequest {
  string actor_template_namespace = 3;
  string actor_template_name      = 4;
  string actor_id                 = 5;

  RunscConfig runsc = 8;

  WorkloadSpec spec = 7;

  // The worker pool this actor should be scheduled on.
  string worker_pool_namespace = 9;
  string worker_pool_name      = 10;
}

message GCPAuthenticationConfig {
  bool use = 1;
}

message AuthenticationConfig {
  GCPAuthenticationConfig gcp = 1;
}

message RunscPlatformConfig {
  // Check the downloaded binary against this hash.  Also used for naming the
  // downloaded file to prevent collisions.
  string sha256_hash = 1;

  // gs:// URL to download the runsc binary.
  string url = 2;
}

message RunscConfig {
  RunscPlatformConfig amd64 = 1;
  RunscPlatformConfig arm64 = 2;

  // How should atelet authenticate to fetch the runsc binary?
  AuthenticationConfig authentication = 3;
}

// WorkloadSpec parallels Pod, but with far fewer configurable fields.
message WorkloadSpec {
  repeated Container containers  = 1;
  string             pause_image = 2;
}

message Container {
  string            name    = 1;
  string            image   = 2;
  repeated string   command = 3;
  repeated EnvEntry env     = 4;
}

message EnvEntry {
  string name  = 1;
  string value = 2;
}

message RunResponse {
  string worker_pod_namespace = 1;
  string worker_pod_name      = 2;
  string worker_pod_ip        = 3;
}

message CheckpointRequest {
  string actor_template_namespace = 3;
  string actor_template_name      = 4;
  string actor_id                 = 5;

  RunscConfig runsc = 6;

  WorkloadSpec spec = 7;

  // An object storage URI prefix below which the checkpoint data will be
  // stored.
  //
  // The structure of the checkpoint should generally be treated as opaque. For
  // gVisor, the checkpoint consists of a checkpoint.img file that contains the
  // memory, sentry state, and filesystem deltas.  ateom will write additional
  // files to store the WorkloadSpec, which must be reassembled before gVisor
  // can restore a checkpoint.
  //
  // For example: "gs://bucket/actors/1234/snapshots/5678/"
  string snapshot_uri_prefix = 8;
}

message CheckpointResponse {

}

message RestoreRequest {
  string actor_template_namespace = 3;
  string actor_template_name      = 4;
  string actor_id                 = 5;

  RunscConfig runsc = 6;

  WorkloadSpec spec = 7;

  // The object storage URI prefix of the snapshot to restore.
  string snapshot_uri_prefix = 8;

  // The worker pool this actor should be scheduled on.
  string worker_pool_namespace = 9;
  string worker_pool_name      = 10;
}

message RestoreResponse {
  string worker_pod_namespace = 1;
  string worker_pod_name      = 2;
  string worker_pod_ip        = 3;
}

message WatchCapacityRequest {}

// CapacitySnapshot is the full capacity state for all worker pools on a node.
message CapacitySnapshot {
  repeated PoolCapacity pools = 1;
}

// PoolCapacity reports worker pod availability for a single worker pool on one node.
message PoolCapacity {
  // pool_namespace is the Kubernetes namespace of the WorkerPool resource.
  string pool_namespace = 1;
  // pool_name is the name of the WorkerPool resource.
  string pool_name      = 2;
  // free is the number of worker pods not currently assigned to any actor.
  int32  free           = 3;
  // total is the total number of worker pods registered on this node for this pool.
  int32  total          = 4;
}
