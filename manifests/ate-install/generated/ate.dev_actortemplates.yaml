---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: actortemplates.ate.dev
spec:
  group: ate.dev
  names:
    kind: ActorTemplate
    listKind: ActorTemplateList
    plural: actortemplates
    shortNames:
    - actortemplate
    singular: actortemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sandboxClass
      name: Class
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ActorTemplate. This field
              is immutable.
            properties:
              containers:
                description: Containers is the workload definition.
                items:
                  description: A single application container that you want to run
                    within a WorkerPool.
                  properties:
                    args:
                      description: |-
                        Arguments to the entrypoint. Not executed within a shell. The container
                        image's CMD is used if this is not provided (unless command is set,
                        which discards the image's CMD).

                        Unlike Kubernetes, variable references $(VAR_NAME) are NOT expanded.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                      x-kubernetes-list-type: atomic
                    command:
                      description: |-
                        Entrypoint array. Not executed within a shell. The container image's
                        ENTRYPOINT is used if this is not provided; if it is provided, the
                        image's ENTRYPOINT and CMD are both ignored and the process argv is
                        command + args.

                        Unlike Kubernetes, variable references $(VAR_NAME) are NOT expanded.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                      x-kubernetes-list-type: atomic
                    env:
                      description: Environment variables to set in the worker replicas.
                      items:
                        description: |-
                          EnvVar represents an environment variable supplied to a container in an
                          ActorTemplate. It models only a subset of Kubernetes Pod env behavior:
                          literal values are not expanded with Kubernetes-style $(VAR) references,
                          envFrom is not supported, and valueFrom currently supports only secretKeyRef.
                        properties:
                          name:
                            description: |-
                              Name is the name of the environment variable. May be any printable ASCII
                              character except '='.
                            minLength: 1
                            pattern: ^[ -<>-~]+$
                            type: string
                          value:
                            description: |-
                              Variable value. Mutually exclusive with ValueFrom.
                              Value is the literal value of the environment variable. Unlike in
                              Kubernetes pods, this value is not interpolated, and $(VAR)
                              references are not expanded.
                            minLength: 0
                            type: string
                          valueFrom:
                            description: |-
                              Source for the environment variable's value. Mutually exclusive with
                              Value.
                            maxProperties: 1
                            minProperties: 1
                            properties:
                              secretKeyRef:
                                description: Selects a key of a Secret in the ActorTemplate's
                                  namespace.
                                properties:
                                  key:
                                    description: Key to select within the Secret.
                                    minLength: 1
                                    pattern: ^[-._a-zA-Z0-9]+$
                                    type: string
                                  name:
                                    description: Name of the referent Secret.
                                    maxLength: 253
                                    type: string
                                    x-kubernetes-validations:
                                    - message: Name must be a valid DNS subdomain
                                      rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                                  optional:
                                    description: Specify whether the Secret or its
                                      key must be defined.
                                    type: boolean
                                required:
                                - key
                                - name
                                type: object
                            type: object
                        required:
                        - name
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of the fields in [value valueFrom]
                            must be set
                          rule: '[has(self.value),has(self.valueFrom)].filter(x,x==true).size()
                            == 1'
                      maxItems: 32
                      type: array
                    image:
                      description: Image to use for the worker replicas.
                      type: string
                      x-kubernetes-validations:
                      - message: All images must be pinned (changing the image invalidates
                          snapshots)
                        rule: self.contains('@')
                    name:
                      description: Name of the container.
                      maxLength: 63
                      type: string
                      x-kubernetes-validations:
                      - message: Name must be a valid DNS label
                        rule: '!format.dns1123Label().validate(self).hasValue()'
                    readyz:
                      description: |-
                        Readyz is an optional HTTP readiness probe. When set, the actor is not
                        considered ready (and Run/Restore RPCs do not return success) until the
                        container's HTTP endpoint returns 200.
                      properties:
                        httpGet:
                          description: HTTPGet specifies the HTTP request to perform
                            against the container.
                          properties:
                            path:
                              default: /readyz
                              description: |-
                                Path to access on the HTTP server. Defaults to "/readyz".
                                Must be a valid URL path starting with "/". Only characters permitted
                                by RFC 3986 path segments are accepted; percent-escapes must be a
                                literal "%" followed by exactly two hex digits. Query strings ("?")
                                and fragments ("#") must be omitted.
                              maxLength: 1024
                              pattern: ^/([A-Za-z0-9\-._~!$&'()*+,;=:@/]|%[0-9A-Fa-f]{2})*$
                              type: string
                            port:
                              description: Port to access on the container.
                              format: int32
                              maximum: 65535
                              minimum: 1
                              type: integer
                          required:
                          - port
                          type: object
                      required:
                      - httpGet
                      type: object
                    volumeMounts:
                      description: volumeMounts define the volumes to mount into this
                        container.
                      items:
                        description: VolumeMount describes a mounting of a Volume
                          within a actor.
                        properties:
                          mountPath:
                            description: |-
                              Path within the actor at which the volume should be mounted. Must be a
                              clean absolute Unix path: must start with '/', not be '/', and contain
                              no ':', '..', '.', '//', trailing '/', or control characters.
                            maxLength: 4096
                            type: string
                            x-kubernetes-validations:
                            - message: 'MountPath must be a clean absolute Unix path:
                                must start with ''/'', not be ''/'', and contain no
                                '':'', ''..'', ''.'', ''//'', trailing ''/'', or control
                                characters'
                              rule: self.startsWith('/') && size(self) > 1 && !self.endsWith('/')
                                && !self.contains('//') && !self.contains(':') &&
                                !self.matches('[\x00-\x1f\x7f]') && !self.matches('(^|/)[.][.]?(/|$)')
                          name:
                            description: This must match the Name of a Volume.
                            maxLength: 63
                            type: string
                            x-kubernetes-validations:
                            - message: Name must be a valid DNS label
                              rule: '!format.dns1123Label().validate(self).hasValue()'
                        required:
                        - mountPath
                        - name
                        type: object
                      maxItems: 32
                      type: array
                  required:
                  - image
                  - name
                  type: object
                maxItems: 10
                type: array
              pauseImage:
                description: |-
                  PauseImage is the container to use as the root sandbox container.

                  Typically, set it to [1] for on-gcp, and [2] for off-gcp

                    - [1] gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da
                    - [2] registry.k8s.io/pause:3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4
                type: string
                x-kubernetes-validations:
                - message: All images must be pinned (changing the image invalidates
                    snapshots)
                  rule: self.contains('@')
              sandboxClass:
                default: gvisor
                description: |-
                  SandboxClass selects the sandbox runtime family this template's actors run
                  on. Only worker pools whose SandboxClass matches are eligible. Snapshots are
                  not portable across classes, so this is a hard gate, AND'd with WorkerSelector
                  and the actor's worker_selector. Defaults to gvisor.


                  1) How does someone discover what classes are available, or what they mean?
                  2) How does someone define a new sandbox class?
                  3) Does a class mean the specific type of sandbox tech or does it include some aspect of config (e.g. can we have 2 different classes which both use gVisor with different config, or 2 classes which use different microvms)
                  4) How does the default get set and who sets it?

                  See Also: WorkerPool SandboxClass
                enum:
                - gvisor
                - microvm
                type: string
              snapshotsConfig:
                description: Snapshots configuration for the actor.
                properties:
                  location:
                    description: Location to store snapshots in.
                    minLength: 1
                    type: string
                  onCommit:
                    default: Full
                    description: |-
                      OnCommit specifies what to include in the snapshot when a commit is requested.
                      If not provided, the "Full" behavior is used by default.
                      onCommit must be a subset of the onPause content.

                      For example:
                        - if onPause is "Full", then onCommit can be "Full" or "Data".
                        - if onPause is "Data", then onCommit must be "Data".
                    enum:
                    - Full
                    - Data
                    type: string
                  onPause:
                    default: Full
                    description: |-
                      OnPause specifies what to include in the snapshot when the actor is paused.
                      If not provided, the "Full" behavior is used by default.
                    enum:
                    - Full
                    - Data
                    type: string
                required:
                - location
                type: object
                x-kubernetes-validations:
                - message: onCommit must be a subset of onPause
                  rule: '(has(self.onPause) ? self.onPause : ''Full'') == ''Full''
                    || (has(self.onCommit) ? self.onCommit : ''Full'') == (has(self.onPause)
                    ? self.onPause : ''Full'')'
              volumes:
                description: Volumes defines the volumes to mount into all containers
                  in the actor.
                items:
                  properties:
                    durableDir:
                      description: |-
                        durableDir represents a durable directory on rootfs that persists across
                        resumes and participates in snapshots.
                      type: object
                    name:
                      description: name of the volume.
                      maxLength: 63
                      type: string
                      x-kubernetes-validations:
                      - message: Name must be a valid DNS label
                        rule: '!format.dns1123Label().validate(self).hasValue()'
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of the fields in [durableDir] must be set
                    rule: '[has(self.durableDir)].filter(x,x==true).size() == 1'
                maxItems: 32
                type: array
              workerSelector:
                description: |-
                  WorkerSelector restricts which worker pools actors from this template may
                  use. The scheduler only considers pools whose labels match this selector.
                  If nil, all pools are eligible (subject to the actor's own worker_selector).
                  Acts as a gate: the actor's worker_selector can only narrow this set further,
                  never expand it.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - pauseImage
            - snapshotsConfig
            type: object
            x-kubernetes-validations:
            - message: Spec is immutable
              rule: self == oldSelf
            - message: At most one DurableDir-typed volume is supported per ActorTemplate
              rule: '!has(self.volumes) || self.volumes.filter(v, has(v.durableDir)).size()
                <= 1'
            - message: A container may mount at most one DurableDir-typed volume
              rule: '!has(self.containers) || self.containers.all(c, !has(c.volumeMounts)
                || c.volumeMounts.filter(vm, has(self.volumes) && self.volumes.exists(v,
                v.name == vm.name && has(v.durableDir))).size() <= 1)'
            - message: DurableDir volumes are not supported when sandboxClass is 'microvm'
              rule: '!has(self.sandboxClass) || self.sandboxClass != ''microvm'' ||
                !has(self.volumes) || !self.volumes.exists(v, has(v.durableDir))'
          status:
            description: status is the observed state of ActorTemplate
            properties:
              conditions:
                description: conditions defines the status conditions array
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              goldenActorID:
                type: string
              goldenSnapshot:
                type: string
              phase:
                description: Phase of the actor template.
                type: string
              takeGoldenSnapshotAt:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
